<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChiperFlux — Web3 x NFT x AI</title>
    <meta name="description" content="Crypto alpha, airdrop guides, trading insights & Web3 tools. Built by @Chiperflux.">
    <meta property="og:title" content="ChiperFlux — Web3 x NFT x AI">
    <meta property="og:description" content="Crypto alpha, airdrop guides, trading insights & Web3 tools.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@Chiperflux">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div class="bg-glow bg-glow-3"></div>

    <!-- Live Ticker -->
    <div class="ticker-bar">
        <div class="ticker-content" id="ticker">
            <span class="ticker-item"><span class="ticker-symbol">BTC</span> <span class="ticker-price" id="btc-price">—</span></span>
            <span class="ticker-item"><span class="ticker-symbol">ETH</span> <span class="ticker-price" id="eth-price">—</span></span>
            <span class="ticker-item"><span class="ticker-symbol">SOL</span> <span class="ticker-price" id="sol-price">—</span></span>
            <span class="ticker-item"><span class="ticker-symbol">BNB</span> <span class="ticker-price" id="bnb-price">—</span></span>
            <span class="ticker-item"><span class="ticker-symbol">HYPE</span> <span class="ticker-price" id="hype-price">—</span></span>
        </div>
    </div>

    <main class="container">
        <!-- Hero Profile -->
        <header class="hero">
            <div class="hero-glow"></div>
            <div class="avatar-ring">
                <div class="avatar" id="avatar">CF</div>
                <div class="status-pulse"></div>
            </div>
            <h1 class="hero-name" id="name">ChiperFlux</h1>
            <p class="hero-handle" id="handle">@Chiperflux</p>
            <p class="hero-bio" id="bio">Web3 x NFT x AI • Smart creativity • Crypto & Blockchain</p>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" id="followers">—</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="following">—</span>
                    <span class="stat-label">Following</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" id="threadCount">—</span>
                    <span class="stat-label">Threads</span>
                </div>
            </div>
        </header>

        <!-- Quick Links -->
        <section class="section">
            <h2 class="section-title">
                <span class="section-icon">🔗</span>
                Connect
            </h2>
            <div class="links-grid" id="linksGrid"></div>
        </section>

        <!-- Threads -->
        <section class="section">
            <h2 class="section-title">
                <span class="section-icon">🧵</span>
                Latest Threads
            </h2>
            <div class="threads-grid" id="threadsGrid"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-brand">
                <span class="footer-logo">⚡</span>
                <span>ChiperFlux</span>
            </div>
            <p>Built with ❤️ by <a href="https://x.com/Chiperflux" target="_blank">@Chiperflux</a></p>
            <p class="footer-sub">Powered by Vercel • Data from CoinGecko & Twitter</p>
        </footer>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
